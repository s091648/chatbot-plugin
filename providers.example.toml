# LLM Provider Configuration
#
# Copy this file to providers.toml and set real API key env vars.
# providers.toml is gitignored — never commit real keys.
#
# Env var names must match scrape-and-analyze:
#   GEMINI_API_KEY, CLAUDE_API_KEY, OPENROUTER_API_KEY

[[providers]]
name = "gemini"
priority = 1
model = "gemini-2.5-flash"
api_key_env = "GEMINI_API_KEY"

[providers.strategy]
type = "sliding_window"
rpm = 5
tpm = 250000
rpd = 500

[[providers]]
name = "claude"
priority = 2
model = "claude-sonnet-4-6-20250514"
api_key_env = "CLAUDE_API_KEY"

[providers.strategy]
type = "sliding_window"
rpm = 5
tpm = 100000
rpd = 200

[[providers]]
name = "openrouter"
priority = 3
model = "deepseek/deepseek-chat"
api_key_env = "OPENROUTER_API_KEY"

[providers.strategy]
type = "sliding_window"
rpm = 20
tpm = 100000
rpd = 200
