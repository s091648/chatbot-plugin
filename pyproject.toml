[project]
name = "chatbot-plugin"
version = "0.1.0"
description = "Chatbot plugin for scrape-and-analyze — pluggable conversational AI over scraped articles"
requires-python = ">=3.11"
dependencies = [
    "scrape-analyzer",
    "fastapi",
    "uvicorn[standard]",
    "pydantic>=2.0",
    "structlog",
    "sqlalchemy",
    "anthropic",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/chatbot_plugin"]

[tool.pytest.ini_options]
testpaths = ["src/tests"]
asyncio_mode = "auto"
